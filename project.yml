name: CarDecodingChallenge
options:
  bundleIdPrefix: com.interviewing
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  CarDecodingChallenge:
    type: framework
    platform: iOS
    sources:
      - CarDecodingChallenge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.interviewing.CarDecodingChallenge
  CarDecodingChallengeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CarDecodingChallengeTests
    dependencies:
      - target: CarDecodingChallenge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.interviewing.CarDecodingChallengeTests
schemes:
  CarDecodingChallenge:
    build:
      targets:
        CarDecodingChallenge: all
    test:
      targets:
        - CarDecodingChallengeTests
